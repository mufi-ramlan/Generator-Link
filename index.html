<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Link Undangan</title>

<link rel="stylesheet" href="./generator.css">
</head>
<body>

<div class="card">

<h2>Generator Link Tamu</h2>

<input
type="text"
id="nama"
placeholder="Masukkan nama tamu"
/>

<button onclick="generateLink()">
Buat Link
</button>


<!-- HASIL LINK -->
<div class="hasil" id="hasil">
Link akan muncul di sini
</div>

<button class="copy" onclick="copyLink()">
Copy Link
</button>


<!-- TEMPLATE PESAN -->
<h3>Template Pesan WhatsApp</h3>

<textarea
id="templatePesan"
rows="10"
readonly
placeholder="Pesan undangan otomatis muncul di sini">
</textarea>


<div class="action-group">
<button onclick="copyPesan()">
Copy Pesan
</button>

<button onclick="kirimWhatsapp()">
Kirim WhatsApp
</button>
</div>

</div>

<script src="./generator.js"></script>

</body>
</html>
